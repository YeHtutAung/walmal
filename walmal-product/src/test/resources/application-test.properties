# Test configuration for walmal-product module
# Testcontainers overrides spring.datasource.* at runtime — these are fallback values
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Redis and RabbitMQ auto-configuration for unit/slice tests
# Integration tests use @SpringBootTest which wires everything
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
