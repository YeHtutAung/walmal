# Test configuration for walmal-notification module
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Redis and RabbitMQ auto-configuration for unit/slice tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

# JWT config required by Auth security filter in test context
walmal.jwt.secret=test-secret-key-for-notification-integration-tests-min32chars
walmal.jwt.access-token-expire-minutes=15
walmal.jwt.refresh-token-expire-days=7

# Notification properties
walmal.notification.staff-distribution-email=staff@walmal.test
