services:
  postgres:
    image: postgres:15
    container_name: walmal-postgres
    environment:
      POSTGRES_DB: walmal
      POSTGRES_USER: walmal
      POSTGRES_PASSWORD: walmal
    ports:
      - "5432:5432"
    volumes:
      - walmal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walmal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: walmal-redis
    ports:
      - "6379:6379"
    volumes:
      - walmal-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: walmal-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: walmal
      RABBITMQ_DEFAULT_PASS: walmal
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - walmal-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: walmal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: walmal
      MINIO_ROOT_PASSWORD: walmal123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - walmal-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: walmal-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    # Opt-in only: `docker compose up` starts just the backing services, so it
    # never races the locally-built JAR for :8080. Run the containerised backend
    # with `docker compose --profile full up -d --wait`.
    profiles: ["full"]
    build: .
    container_name: walmal-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walmal
      SPRING_DATASOURCE_USERNAME: walmal
      SPRING_DATASOURCE_PASSWORD: walmal
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: walmal
      SPRING_RABBITMQ_PASSWORD: walmal
      WALMAL_MINIO_URL: http://minio:9000
      WALMAL_MINIO_ACCESS_KEY: walmal
      WALMAL_MINIO_SECRET_KEY: walmal123
      WALMAL_JWT_SECRET: walmal-docker-secret-key-change-in-production-minimum-256-bits
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
      WALMAL_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177"
      SPRING_PROFILES_ACTIVE: test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  walmal-postgres-data:
  walmal-redis-data:
  walmal-rabbitmq-data:
  walmal-minio-data:
