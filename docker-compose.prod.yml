# ─────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Production stack
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Secrets are injected via .env file or the shell environment.
# Never hardcode secrets in this file.
# ─────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: walmal
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - walmal-postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d walmal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${SPRING_DATA_REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - walmal-redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_DATA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  # ── RabbitMQ ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD}
    volumes:
      - walmal-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  # ── MinIO ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - walmal-minio-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  # ── MailHog (demo/test-mode email sink) ──────────────────────────
  # Test mode means no real customer email is ever sent; MailHog lets the
  # demo show "the emails the shop sends" via the mail. subdomain (Caddy
  # basic-auth protected — see deploy/Caddyfile).
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging

  # ── Walmal Application ──────────────────────────────────────────
  app:
    image: ${WALMAL_IMAGE:-ghcr.io/yehtutaung/walmal/walmal-app:latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walmal
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      WALMAL_JWT_SECRET: ${WALMAL_JWT_SECRET}
      WALMAL_CORS_ALLOWED_ORIGINS: ${WALMAL_CORS_ALLOWED_ORIGINS}
      WALMAL_TRUST_PROXY: ${WALMAL_TRUST_PROXY:-true}
      # Stripe stays in TEST mode (public demo store) — see docs/DEPLOYMENT.md.
      # Fail-closed: the gateway bean does not exist without these two set.
      WALMAL_PAYMENT_GATEWAY: stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # MailHog accepts neither SMTP auth nor STARTTLS — defaults below are
      # MailHog-compatible; override only if SPRING_MAIL_HOST is swapped for
      # a real SMTP provider.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailhog}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      WALMAL_RATE_LIMIT_AUTHENTICATED: ${WALMAL_RATE_LIMIT_AUTHENTICATED:-60}
      WALMAL_RATE_LIMIT_UNAUTHENTICATED: ${WALMAL_RATE_LIMIT_UNAUTHENTICATED:-20}
      # JVM tuning
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging: *default-logging

  # ── Storefront (Next.js, CI-built) ───────────────────────────────
  store:
    image: ${WALMAL_STORE_IMAGE:-ghcr.io/yehtutaung/walmal-store:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # NEXT_PUBLIC_* values are baked in at CI build time (see
      # walmal-store's build-and-push job) — not runtime env here.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # The store's /api/minio proxy route reads this at runtime (defaults
      # to http://localhost:9000 for dev); in this stack MinIO is reachable
      # only by service name on the backend network. Static topology fact —
      # deliberately not a .env knob.
      MINIO_INTERNAL_URL: http://minio:9000
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging

  # ── Admin SPA (nginx, CI-built) ───────────────────────────────────
  admin:
    image: ${WALMAL_ADMIN_IMAGE:-ghcr.io/yehtutaung/walmal-admin:latest}
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging

  # ── Uptime Kuma (status page + alerting) ─────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - walmal-uptime-kuma-data:/app/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging: *default-logging

  # ── Caddy — reverse proxy + automatic TLS ────────────────────────
  # The ONLY service publishing host ports. Terminates TLS (Let's
  # Encrypt via ACME) for every subdomain and reverse-proxies to the
  # internal-only "backend" network; see deploy/Caddyfile.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - walmal-caddy-data:/data
      - walmal-caddy-config:/config
    environment:
      WALMAL_DOMAIN: ${WALMAL_DOMAIN}
      MAILHOG_BASIC_AUTH: ${MAILHOG_BASIC_AUTH}
    networks:
      - backend
      - frontend
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

volumes:
  walmal-postgres-data:
    driver: local
  walmal-redis-data:
    driver: local
  walmal-rabbitmq-data:
    driver: local
  walmal-minio-data:
    driver: local
  walmal-uptime-kuma-data:
    driver: local
  walmal-caddy-data:
    driver: local
  walmal-caddy-config:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true   # no direct internet access
  frontend:
    driver: bridge   # only Caddy joins this (ACME + published 80/443); every
                      # other service is backend-only per the topology in
                      # docs/superpowers/specs/2026-07-19-production-deployment-design.md
