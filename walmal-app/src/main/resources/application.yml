spring:
  application:
    name: walmal

  datasource:
    url: jdbc:postgresql://localhost:5432/walmal
    username: walmal
    password: walmal

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: walmal
    password: walmal

  mail:
    host: localhost
    port: 1025

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

walmal:
  minio:
    url: http://localhost:9000
    access-key: walmal
    secret-key: walmal123
  jwt:
    secret: ${WALMAL_JWT_SECRET:walmal-dev-secret-key-change-in-production-minimum-256-bits}
    access-token-expire-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: walmal

inventory:
  reservation:
    expiry-job-interval-ms: 60000
    default-expiry-minutes: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
