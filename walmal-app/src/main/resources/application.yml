spring:
  application:
    name: walmal

  datasource:
    url: jdbc:postgresql://localhost:5432/walmal
    username: walmal
    password: walmal

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: walmal
    password: walmal

  mail:
    host: localhost
    port: 1025

walmal:
  minio:
    url: http://localhost:9000
    access-key: walmal
    secret-key: walmal123

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
