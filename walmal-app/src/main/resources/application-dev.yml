# ─────────────────────────────────────────────────────────────────
# Profile: dev
# Localhost defaults, permissive settings, verbose logging.
# Activated with: --spring.profiles.active=dev
# ─────────────────────────────────────────────────────────────────

spring:
  mail:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoint:
    health:
      show-details: always

walmal:
  rate-limit:
    authenticated-limit: 1000
    unauthenticated-limit: 300

logging:
  level:
    com.walmal: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
