spring:
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

walmal:
  cors:
    # Required in production — set WALMAL_CORS_ALLOWED_ORIGINS=https://app.walmal.com
    allowed-origins: "${WALMAL_CORS_ALLOWED_ORIGINS}"
# Set WALMAL_TRUST_PROXY=true when a reverse proxy (Nginx/Caddy) is in front of this service.
