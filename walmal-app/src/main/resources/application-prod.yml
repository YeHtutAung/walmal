# ─────────────────────────────────────────────────────────────────
# Profile: prod
# Production hardening — strict settings, JSON logging, no debug.
# Activated with: --spring.profiles.active=prod
#
# All secrets MUST be injected via environment variables.
# Never commit production credentials to source control.
# ─────────────────────────────────────────────────────────────────

spring:
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          # MailHog (the prod-compose demo email sink) supports neither SMTP
          # auth nor STARTTLS — defaults are MailHog-compatible. Set both to
          # true via env if SPRING_MAIL_HOST is later swapped for a real
          # SMTP provider.
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

walmal:
  cors:
    # Required: set to your production frontend URL, e.g. https://app.walmal.com
    allowed-origins: "${WALMAL_CORS_ALLOWED_ORIGINS}"

# Profile marker on the public /actuator/info endpoint, mirroring the test
# profile's marker (application-test.yml) — lets ops/monitoring confirm a
# running container actually booted with -Dspring.profiles.active=prod.
info:
  walmal:
    profile: prod

management:
  endpoints:
    web:
      exposure:
        # Only health and prometheus in production (metrics require ADMIN role per SecurityConfig)
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: walmal
      environment: prod

logging:
  level:
    root: WARN
    com.walmal: INFO
    org.springframework: WARN
    org.flywaydb: INFO
    # Silence noisy connection pool messages
    com.zaxxer.hikari: WARN

# Disable Swagger in production (expose only in staging/dev)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
