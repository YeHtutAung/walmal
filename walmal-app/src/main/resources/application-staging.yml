# ─────────────────────────────────────────────────────────────────
# Profile: staging
# Staging environment — real services, moderate logging, test data.
# Activated with: --spring.profiles.active=staging
#
# All secrets MUST be injected via environment variables.
# Never commit staging credentials to source control.
# ─────────────────────────────────────────────────────────────────

spring:
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

walmal:
  cors:
    allowed-origins: "${WALMAL_CORS_ALLOWED_ORIGINS}"

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.walmal: INFO
    org.springframework: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    enabled: true   # keep enabled on staging for QA access
  api-docs:
    enabled: true
