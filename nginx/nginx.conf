# ─────────────────────────────────────────────────────────────────
# nginx.conf — Reverse proxy for Walmal API
#
# Place SSL certificates at:
#   nginx/ssl/fullchain.pem
#   nginx/ssl/privkey.pem
#
# Obtain via: certbot certonly --webroot -w /var/www/html -d api.walmal.com
# ─────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"request_id":"$request_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  # ── Performance ────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;
  gzip_min_length 1024;

  # ── Security headers ───────────────────────────────────────────
  server_tokens off;

  # ── Rate limiting ──────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
  limit_req_status 429;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────
  server {
    listen 80;
    server_name api.walmal.com;

    location /.well-known/acme-challenge/ {
      root /var/www/html;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name api.walmal.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://app:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # ── Actuator — restrict to internal monitoring ───────────────
    location /actuator/health {
      proxy_pass http://app:8080;
      proxy_set_header Host $host;
      # Allow from monitoring IPs only — adjust as needed
      # allow 10.0.0.0/8;
      # deny all;
    }

    location /actuator/ {
      # Block public access to all other actuator endpoints
      deny all;
    }

    # ── Block common attack paths ────────────────────────────────
    location ~* \.(php|asp|aspx|jsp)$ {
      return 404;
    }
  }
}
