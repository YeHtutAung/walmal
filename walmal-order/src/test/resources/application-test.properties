# Test configuration for walmal-order module
# Testcontainers overrides spring.datasource.* at runtime — these are fallback values
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Redis and RabbitMQ auto-configuration for unit/slice tests
# Integration tests use @SpringBootTest which wires everything
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT config required by Auth security filter in test context
walmal.jwt.secret=test-secret-key-for-order-integration-tests-min32chars
walmal.jwt.access-token-expire-minutes=15
walmal.jwt.refresh-token-expire-days=7
