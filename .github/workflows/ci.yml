name: Walmal CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/walmal-app

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Test
  # Spins up infrastructure, runs all 247 tests
  # ─────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: walmal
          POSTGRES_USER: walmal
          POSTGRES_PASSWORD: walmal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: walmal
          RABBITMQ_DEFAULT_PASS: walmal
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/walmal
          SPRING_DATASOURCE_USERNAME: walmal
          SPRING_DATASOURCE_PASSWORD: walmal
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: walmal
          SPRING_RABBITMQ_PASSWORD: walmal
          SPRING_DATA_REDIS_HOST: localhost
          WALMAL_JWT_SECRET: ${{ secrets.WALMAL_JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # Only runs on push to main or develop (not PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already run)
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Security Scan
  # Scans the built image for known vulnerabilities
  # Direct binary install — bypasses compromised action
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      security-events: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy v0.70.0 directly
        run: |
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb
          trivy --version

      - name: Run Trivy vulnerability scan
        run: |
          IMAGE_REF=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            "$IMAGE_REF"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # Job 4: Deploy to Staging
  # Only runs on push to main, and only when deployment is enabled.
  # No staging environment exists yet — the DEPLOY_ENABLED repo variable
  # gates this job (jobs cannot read secrets in `if:`). Skipping it
  # cascades through the needs-chain (smoke-staging → deploy-prod →
  # smoke-prod all show as skipped), so pushes go green on test/build/scan.
  # To activate: set repo variable DEPLOY_ENABLED=true + the STAGING_*
  # secrets. Until then the chain stays here as the documented CD design.
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ build-and-push, security-scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          echo "Deploying $IMAGE_TAG to staging..."
          # Replace this block with your actual deploy command:
          #
          # Option A — SSH + Docker Compose on a VPS:
          # echo "$STAGING_SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          # ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" "
          #   export WALMAL_IMAGE_TAG=$IMAGE_TAG
          #   cd /opt/walmal
          #   docker compose -f docker-compose.prod.yml pull app
          #   docker compose -f docker-compose.prod.yml up -d app
          # "
          #
          # Option B — Railway / Render / Fly.io CLI:
          # railway up --service walmal-app
          #
          # Option C — Kubernetes:
          # kubectl set image deployment/walmal-app walmal-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          echo "Deploy step — configure for your target platform (see docs/DEPLOYMENT.md)."

  # ─────────────────────────────────────────────
  # Job 5: Smoke Tests — Staging
  # Verifies the staging deployment is healthy
  # ─────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for staging to be healthy
        env:
          STAGING_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Waiting for $STAGING_URL/actuator/health to be UP..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf "$STAGING_URL/actuator/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Staging is healthy."
              exit 0
            fi
            echo "Attempt $i/24: status='$STATUS' — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Staging did not become healthy within 4 minutes."
          exit 1

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL }}
        run: ./scripts/smoke-test.sh "$BASE_URL"

  # ─────────────────────────────────────────────
  # Job 6: Deploy to Production
  # Requires manual approval via GitHub environment
  # protection rules (configure in repo Settings >
  # Environments > production > Required reviewers).
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # <-- triggers the manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          echo "Deploying $IMAGE_TAG to PRODUCTION..."
          # Replace with your actual deploy command — same pattern as staging:
          # echo "$PROD_SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          # ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$PROD_USER@$PROD_HOST" "
          #   export WALMAL_IMAGE_TAG=$IMAGE_TAG
          #   cd /opt/walmal
          #   docker compose -f docker-compose.prod.yml pull app
          #   docker compose -f docker-compose.prod.yml up -d app
          # "
          echo "Deploy step — configure for your target platform (see docs/DEPLOYMENT.md)."

      - name: Record deployment
        run: |
          echo "Production deployment of sha-${{ github.sha }} completed at $(date -Iseconds)"

  # ─────────────────────────────────────────────
  # Job 7: Smoke Tests — Production
  # Verifies the production deployment is healthy
  # ─────────────────────────────────────────────
  smoke-test-prod:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for production to be healthy
        env:
          PROD_URL: ${{ secrets.PROD_API_URL }}
        run: |
          echo "Waiting for $PROD_URL/actuator/health to be UP..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf "$PROD_URL/actuator/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Production is healthy."
              exit 0
            fi
            echo "Attempt $i/24: status='$STATUS' — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Production did not become healthy within 4 minutes."
          exit 1

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.PROD_API_URL }}
        run: ./scripts/smoke-test.sh "$BASE_URL"

      - name: Notify on failure
        if: failure()
        run: |
          echo "PRODUCTION smoke tests FAILED for sha-${{ github.sha }}."
          echo "Consider rolling back: see docs/DEPLOYMENT.md#rollback"
          # Add Slack/PagerDuty notification here if needed
