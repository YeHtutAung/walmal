name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: walmal
          POSTGRES_USER: walmal
          POSTGRES_PASSWORD: walmal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U walmal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walmal
          RABBITMQ_DEFAULT_PASS: walmal
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/walmal
          SPRING_DATASOURCE_USERNAME: walmal
          SPRING_DATASOURCE_PASSWORD: walmal
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: walmal
          SPRING_RABBITMQ_PASSWORD: walmal
