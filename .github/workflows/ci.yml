name: Walmal CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/walmal-app

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Test
  # Spins up infrastructure, runs all 247 tests
  # ─────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: walmal
          POSTGRES_USER: walmal
          POSTGRES_PASSWORD: walmal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: walmal
          RABBITMQ_DEFAULT_PASS: walmal
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/walmal
          SPRING_DATASOURCE_USERNAME: walmal
          SPRING_DATASOURCE_PASSWORD: walmal
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: walmal
          SPRING_RABBITMQ_PASSWORD: walmal
          SPRING_DATA_REDIS_HOST: localhost
          WALMAL_JWT_SECRET: ${{ secrets.WALMAL_JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
          # JaCoCo is not wired into the Maven build yet — don't warn on the
          # empty glob; the step starts working the day the plugin is added.
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # Only runs on push to main or develop (not PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already run)
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Security Scan
  # Scans the built image for known vulnerabilities
  # Direct binary install — bypasses compromised action
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      security-events: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy v0.70.0 directly
        run: |
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb
          trivy --version

      - name: Run Trivy vulnerability scan
        run: |
          IMAGE_REF=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            "$IMAGE_REF"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # Job 4: Deploy (production)
  # Single VPS, no staging environment (collapsed 2026-07-19 — see
  # docs/DEPLOYMENT.md, which is the reference for the whole deploy story).
  # The DEPLOY_ENABLED repo variable gates this job (jobs cannot read
  # secrets in `if:`); skipping it cascades through the needs-chain (smoke
  # also shows skipped), so pushes go green on test/build/scan with zero
  # infrastructure. To activate: set repo variable DEPLOY_ENABLED=true and
  # the DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY secrets (see the runbook).
  # `environment: production` is kept — GitHub's optional required-
  # reviewers gate stays available without further workflow changes.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: [ build-and-push, security-scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Deploy app via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/walmal
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d app

  # ─────────────────────────────────────────────
  # Job 5: Smoke Test (production)
  # Verifies the production deployment is healthy — public endpoints only,
  # no secrets in URLs.
  # ─────────────────────────────────────────────
  smoke:
    name: Smoke Test (production)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Wait for API to be healthy
        run: |
          echo "Waiting for https://api.${{ vars.WALMAL_DOMAIN }}/actuator/health to be UP..."
          for i in $(seq 1 12); do
            BODY=$(curl -sf "https://api.${{ vars.WALMAL_DOMAIN }}/actuator/health" || echo "")
            if echo "$BODY" | grep -q '"status":"UP"'; then
              echo "API is healthy."
              exit 0
            fi
            echo "Attempt $i/12: retrying in 10s..."
            sleep 10
          done
          echo "ERROR: API did not become healthy within 2 minutes."
          exit 1

      - name: Check storefront responds
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://shop.${{ vars.WALMAL_DOMAIN }}")
          echo "shop. status: $STATUS"
          test "$STATUS" = "200"
