name: Walmal CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/walmal-app

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Test
  # Spins up infrastructure, runs all 247 tests
  # ─────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: walmal
          POSTGRES_USER: walmal
          POSTGRES_PASSWORD: walmal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: walmal
          RABBITMQ_DEFAULT_PASS: walmal
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/walmal
          SPRING_DATASOURCE_USERNAME: walmal
          SPRING_DATASOURCE_PASSWORD: walmal
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: walmal
          SPRING_RABBITMQ_PASSWORD: walmal
          SPRING_DATA_REDIS_HOST: localhost
          WALMAL_JWT_SECRET: ${{ secrets.WALMAL_JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # Only runs on push to main or develop (not PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already run)
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Security Scan
  # Scans the built image for known vulnerabilities
  # Direct binary install — bypasses compromised action
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      security-events: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy v0.70.0 directly
        run: |
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb
          trivy --version

      - name: Run Trivy vulnerability scan
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # Job 4: Deploy to Staging
  # Only runs on push to main
  # Replace the run: block with your actual deploy command
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ build-and-push, security-scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to staging..."
          # Replace this block with your actual deploy command:
          #
          # Option A — SSH + Docker Compose on a VPS:
          # ssh user@your-server "
          #   export WALMAL_IMAGE_TAG=$IMAGE_TAG
          #   cd /opt/walmal
          #   docker compose pull walmal-app
          #   docker compose up -d walmal-app
          # "
          #
          # Option B — Railway / Render / Fly.io CLI:
          # railway up --service walmal-app
          #
          # Option C — Kubernetes:
          # kubectl set image deployment/walmal-app walmal-app=$IMAGE_TAG
          echo "Deploy step — configure for your target platform."